<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Button</title>
	<link rel="stylesheet" href="./CssTemplate/screen.template.css">
	<link rel="stylesheet" href="../src/fontawesome/css/all.css">

	<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
	<script type="text/javascript" src="https://livejs.com/live.js"></script>
	<script src="./script.js"></script>
	<link rel="icon" type="image/png" size="16x16" href="../src/img/favicon.svg">
</head>

<body class="saRootBody saPc saSmallScreen saSmallscreensidebar saSmallScreenSidebarJs saLargeScreenHasTopButtons saSmallScreenHasTopButtons">
	<div class="saRootContentWrapper">
		<div class="saRightFrameRoot">
			<div id="body" class="right standardview saPc smallscreen saSmallScreen saSmallScreenJs saLargeScreenHasTopButtons saSmallScreenHasTopButtons">
				<div class="pagecontentframe">
					<form class="interface">
						<header id="pageheader" class="saPageHeaderHolder">
							<div class="saPageHeader saDesktopHeader">
								<div class="saHeader">
									<div class="saRowWrapper">
										<div class="saTopRow">
											<nav class="saBreadcrumbs">
												<div class="saBackButtonWrapper">
													<button class="saBackButton" type="button" disabled="">
														<i class="fa-arrow-left far saBack saIcon"></i>
													</button>
												</div>
											</nav>
										</div>
										<div class="saBottomRow">
											<div class="saTitle">
												<h1 class="saHeaderText">Test</h1>
												<button class="saFavoriteToggle" type="button" tabindex="-1"
													aria-checked="false" aria-label="Save as favorite">
													<i aria-hidden="true" class="saIcon far fa-star"></i>
													<i aria-hidden="true" class="saIcon fas fa-star"></i>
												</button>
												<ul class="saSpecialLinksWrapper"></ul>
											</div>
										</div>
									</div>
								</div>
							</div>
							<div class="saPageHeader saSmallScreenHeader">
								<div class="saHeader">
									<div class="saHeaderInner">
										<div class="saTopRow">
											<button class="saSmallScreenBackButton saButtonHeader" type="button">
												<i class="far fa-arrow-left saBack saIcon"></i>
											</button>
											<div class="saHeaderWrapper">
												<div class="saTitle">
													<h1 class="saHeaderText">Buttons</h1>
												</div>
											</div>
											<button class="saNotifications saButtonHeader" type="button">
												<i class="far fa-bell saIcon"></i>
												<div class="saBadgeCount saUrgent saEmpty">0</div>
											</button>
											<button class="saNavigator saButtonHeader" type="button">
												<div class="saNavBar">
													<i class="saIcon far fa-bars"></i>
												</div>
											</button>
										</div>
									</div>
									<nav class="saBottomRow saActionLinkBar" style="display: none;"></nav>
								</div>
							</div>
						</header>
						<div class="maincolinner gradients">
							<main id="MI_M" class="menuitem pagecontentframe">
								<div id="MI_ScrollIndicator" class="scrollindicator"></div>
								<div id="MI_ScrollContent" class="scrollcontent saScrollable">
									<div class="scrollcontent-inner">
										<div id="MI_MC_Main" class="maincolbody saInputPage">
											<div>
												<div class="saFormRootAndTocWrapper">
													<fieldset class="saFormRoot saLabelsAbove">
														<div class="saSectionWrapper saLastVisible">
															<div class="saFieldsRow">
																<div class="saFieldsColumn saLastVisible">
																	<div class="saSectionWrapper saLastVisible">
																		<div class="saFieldCollection mediumLong">
																			<div class="saFieldAndLabelWrapper">
																				<label class="saLabelCell" for="timeInput">
																					<div class="saLabel">
																						<span>Time</span>
																					</div>
																				</label>
																				<div class="saFieldCell">
																					<div class="saInputWrapper saMediumShortValidation mediumLong">
																						<div class="saInput">
																							<div class="saInputTextWrapper saInputPageField">
																								<input type="hidden" name="MI$MC$Time$value">
																								<div></div>
																								<input class="saInputText" id="timeInput">
																							</div>
																						</div>
																					</div>
																				</div>
																			</div>
																		</div>
																	</div>
																</div>
															</div>
														</div>
													</fieldset>
												</div>
											</div>
											<div class="saInputPageFooter">
												<div class="saFormButtonGroup">
													<button class="saFormButton saButtonPrimary" type="button">
														<i class="icon fas fa-spin fa-spinner saSpinner"></i>
														<div class="saButtonText">Save</div>
													</button>
													<button class="saFormButton saButtonSecondary" type="button">
														<i class="icon fas fa-spin fa-spinner saSpinner"></i>
														<div class="saButtonText">Cancel</div>
													</button>
												</div>
											</div>
										</div>
									</div>
								</div>
							</main>
						</div>
					</form>
				</div>
			</div>
		</div>
	</div>
	<script>
		$('.saFavoriteToggle').click(function () {
			$(this).attr('aria-checked', function (i, attr) { return attr === 'true' ? 'false' : 'true'; });
		});
	</script>
</body>
