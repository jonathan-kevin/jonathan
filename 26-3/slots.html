		function getDates(start, end) {
			const dates = [];
			let d = new Date(start);
			while (d <= end) {
				dates.push(new Date(d));
				d.setDate(d.getDate() + 1);
			}
			return dates;
		}

		function daysBetween(a, b) {
			return Math.floor((b - a) / 86400000);
		}

		function buildHeaderSpans(dates, type) {
			const groups = [];
			let current = null;

			dates.forEach((d, i) => {
				let key;

				if (type === 'year') key = d.getFullYear();
				if (type === 'quarter') key = 'Q' + (Math.floor(d.getMonth() / 3) + 1);
				if (type === 'month') key = d.toLocaleString('en', { month: 'short' });

				if (!current || current.key !== key) {
					current = { key, start: i, span: 1 };
					groups.push(current);
				} else {
					current.span++;
				}
			});

			return groups;
		}

		function buildGantt($container) {
			const dates = getDates(startDate, endDate);
			const headerRows = 4;
			const rowHeight = 32;

			const $grid = $('<div class="grid" role="grid"></div>');

			$grid.css({
				gridTemplateColumns: `200px repeat(${dates.length}, 28px)`,
				gridTemplateRows: `${[30, 30, 30, 30].join('px ')} repeat(${resources.length}, ${rowHeight}px)`
			});

			// HEADER LEVELS
			const levels = ['year', 'quarter', 'month'];

			levels.forEach((level, row) => {
				const groups = buildHeaderSpans(dates, level);

				groups.forEach(g => {
					const $cell = $(`<div class="cell header">${g.key}</div>`)
						.css({
							gridColumn: `${g.start + 2} / span ${g.span}`,
							gridRow: row + 1
						});

					$grid.append($cell);
				});
			});

			// DAY ROW
			dates.forEach((d, i) => {
				const $cell = $(`<div class="cell header">${d.getDate()}</div>`)
					.attr({ role: 'columnheader', 'aria-colindex': i + 2 })
					.css({ gridColumn: i + 2, gridRow: 4 });

				$grid.append($cell);
			});

			// BODY
			resources.forEach((res, r) => {
				const row = r + headerRows + 1;

				// label
				$grid.append(
					$('<div class="cell label"></div>')
						.text(res.name)
						.css({ gridColumn: 1, gridRow: row })
				);

				// cells
				dates.forEach((d, c) => {
					const $cell = $('<div class="cell bg" tabindex="0"></div>')
						.attr({
							'data-row': r,
							'data-col': c
						})
						.css({
							gridColumn: c + 2,
							gridRow: row
						});

					if (d.getDay() === 0 || d.getDay() === 6) $cell.addClass('weekend');

					$grid.append($cell);
				});

				// bookings
				res.bookings.forEach(b => {
					createBooking($grid, r, b.start, b.end);
				});
			});

			$container.empty().append($grid);
			attachInteractions($grid, dates);
		}

		function createBooking($grid, row, startStr, endStr) {
			const start = new Date(startStr);
			const end = new Date(endStr);

			const colStart = daysBetween(startDate, start);
			const colEnd = daysBetween(startDate, end);

			const $bar = $(`
    <div class="booking" tabindex="0">
      <div class="handle left"></div>
      <div class="handle right"></div>
    </div>
  `);

			$bar.css({
				gridColumn: `${colStart + 2} / ${colEnd + 3}`,
				gridRow: row + 5
			});

			$bar.data({ row, colStart, colEnd });

			$grid.append($bar);
		}

		function attachInteractions($grid, dates) {
			let drag = null;

			// CREATE booking
			$grid.on('mousedown', '.bg', function (e) {
				const row = +$(this).data('row');
				const col = +$(this).data('col');

				drag = { row, start: col, end: col, type: 'create' };

				const $temp = $('<div class="booking"></div>').appendTo($grid);
				drag.el = $temp;
			});

			$(document).on('mousemove', function (e) {
				if (!drag) return;

				const colWidth = 28;
				const offset = $grid.offset().left + 200;

				let col = Math.floor((e.pageX - offset) / colWidth);
				col = Math.max(0, col);

				drag.end = col;

				const start = Math.min(drag.start, drag.end);
				const end = Math.max(drag.start, drag.end);

				drag.el.css({
					gridColumn: `${start + 2} / ${end + 3}`,
					gridRow: drag.row + 5
				});
			});

			$(document).on('mouseup', function () {
				if (!drag) return;

				if (drag.type === 'create') {
					const start = new Date(startDate);
					start.setDate(start.getDate() + Math.min(drag.start, drag.end));

					const end = new Date(startDate);
					end.setDate(end.getDate() + Math.max(drag.start, drag.end));

					resources[drag.row].bookings.push({
						start: start.toISOString().split('T')[0],
						end: end.toISOString().split('T')[0]
					});
				}

				drag = null;
				buildGantt($('.gantt-grid'));
			});

			// RESIZE
			$grid.on('mousedown', '.handle', function (e) {
				e.stopPropagation();

				const $bar = $(this).parent();
				const isLeft = $(this).hasClass('left');

				drag = {
					type: 'resize',
					el: $bar,
					isLeft
				};
			});

			// KEYBOARD NAV
			$grid.on('focus', '.bg', function () {
				$('.focused').removeClass('focused');
				$(this).addClass('focused');
			});

			$grid.on('keydown', '.bg', function (e) {
				const row = +$(this).data('row');
				const col = +$(this).data('col');

				let next;

				if (e.key === 'ArrowRight') next = `[data-row=${row}][data-col=${col + 1}]`;
				if (e.key === 'ArrowLeft') next = `[data-row=${row}][data-col=${col - 1}]`;
				if (e.key === 'ArrowDown') next = `[data-row=${row + 1}][data-col=${col}]`;
				if (e.key === 'ArrowUp') next = `[data-row=${row - 1}][data-col=${col}]`;

				if (next) {
					e.preventDefault();
					$grid.find(next).focus();
				}
			});
		}

		$(function () {
			buildGantt($('.gantt-grid'));
		});
	</script>
	<script>
		$('.saFavoriteToggle').click(function () {
			$(this).attr('aria-checked', function (i, attr) { return attr === 'true' ? 'false' : 'true'; });
		});
	</script>
</body>
