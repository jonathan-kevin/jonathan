	<script>
		const START = new Date('2025-11-01');
		const END = new Date('2026-05-31');

		let resources = [
			{ name: 'Katt', bookings: [{ start: '2026-03-01', end: '2026-05-25' }] },
			{ name: 'Hund', bookings: [{ start: '2026-03-03', end: '2026-05-30' }] },
			{ name: 'Fågel', bookings: [{ start: '2026-03-10', end: '2026-05-12' }] },
			{ name: 'Häst', bookings: [{ start: '2026-03-14', end: '2026-05-18' }] },
			{ name: 'Fisk', bookings: [] },
			{ name: 'Åsna', bookings: [] },
			{ name: 'Gris', bookings: [] },
			{ name: 'Ko', bookings: [] },
			{ name: 'Höna', bookings: [] },
			{ name: 'Lejon', bookings: [] },
			{ name: 'Tiger', bookings: [] },
			{ name: 'Jaguar', bookings: [] },
		];

		const SV_MONTHS_SHORT = ['Januari', 'Februari', 'Mars', 'April', 'Maj', 'Juni', 'Juli', 'Augusti', 'September', 'Oktober', 'November', 'December'];
		const SV_WEEKDAY_NARROW = ['S', 'M', 'T', 'O', 'T', 'F', 'L'];

		function getDates(start, end) {
			const dates = [];
			let d = new Date(start);
			while (d <= end) { dates.push(new Date(d)); d.setDate(d.getDate() + 1); }
			return dates;
		}

		function daysBetween(a, b) {
			return Math.floor((b - a) / 86400000);
		}

		function buildHeaderSpans(dates, key) {
			const groups = [];
			let cur = null;
			dates.forEach((d, i) => {
				const k = key(d);
				if (!cur || cur.key !== k) { cur = { key: k, start: i, span: 1 }; groups.push(cur); }
				else cur.span++;
			});
			return groups;
		}

		const HEADER_LEVELS = [
			{ cls: 'row-year', key: d => d.getFullYear() },
			{ cls: 'row-quarter', key: d => 'Q' + (Math.floor(d.getMonth() / 3) + 1) },
			{ cls: 'row-month', key: d => SV_MONTHS_SHORT[d.getMonth()] },
			{ cls: 'row-dow', key: d => SV_WEEKDAY_NARROW[d.getDay()] },
			{ cls: 'row-day', key: d => d.getDate() },
		];

		const HEADER_ROWS = HEADER_LEVELS.length;
		const COL_W = '1.5rem';
		const ROW_H = '1.5rem';
		const LABEL_W = '9rem';

		function buildGantt($container) {
			const dates = getDates(START, END);
			const $grid = $('<div class="grid" role="grid"></div>');

			$grid.css({
				gridTemplateColumns: `${LABEL_W} repeat(${dates.length}, ${COL_W})`,
				gridTemplateRows: `${HEADER_LEVELS.map(() => '1.5rem').join(' ')} repeat(${resources.length}, ${ROW_H})`,
			});

			HEADER_LEVELS.forEach(({ cls, key }, row) => {
				buildHeaderSpans(dates, key).forEach(g => {
					const $cell = $(`<div class="cell header ${cls}"><span>${g.key}</span></div>`).css({
						gridColumn: `${g.start + 2} / span ${g.span}`,
						gridRow: row + 1,
					});
					// add .weekend if any of the covered dates is Saturday(6) or Sunday(0)
					const isWeekendSpan = (() => {
						for (let i = g.start; i < g.start + g.span; i++) {
							const d = dates[i];
							if (!d) continue;
							if (d.getDay() === 0 || d.getDay() === 6) return true;
						}
						return false;
					})();
					$cell.toggleClass('weekend', isWeekendSpan).appendTo($grid);
				});
			});

			resources.forEach((res, r) => {
				const gridRow = r + HEADER_ROWS + 1;

				$('<div class="cell label"></div>')
					.text(res.name)
					.css({ gridColumn: 1, gridRow })
					.appendTo($grid);

				dates.forEach((d, c) => {
					$('<div class="cell bg" tabindex="0"></div>')
						.attr({ 'data-row': r, 'data-col': c })
						.css({ gridColumn: c + 2, gridRow })
						.toggleClass('weekend', d.getDay() === 0 || d.getDay() === 6)
						.appendTo($grid);
				});

				res.bookings.forEach(b => addBookingBar($grid, r, b.start, b.end));
			});

			$container.empty().append($grid);
			attachInteractions($grid);
		}

		function addBookingBar($grid, row, startStr, endStr) {
			const colStart = daysBetween(START, new Date(startStr));
			const colEnd = daysBetween(START, new Date(endStr));
			$('<div class="booking" tabindex="0"><div class="handle left"></div><div class="handle right"></div></div>')
				.css({ gridColumn: `${colStart + 2} / ${colEnd + 3}`, gridRow: row + HEADER_ROWS + 1 })
				.data({ row, colStart, colEnd })
				.appendTo($grid);
		}

		function dateFromCol(col) {
			const d = new Date(START);
			d.setDate(d.getDate() + col);
			return d.toISOString().split('T')[0];
		}

		function attachInteractions($grid) {
			let drag = null;

			$grid.on('mousedown', '.bg', function (e) {
				const row = +$(this).data('row'), col = +$(this).data('col');
				drag = {
					type: 'create', row, start: col, end: col,
					el: $('<div class="booking"></div>').appendTo($grid)
				};
			});

			$grid.on('mousedown', '.handle', function (e) {
				e.stopPropagation();
				drag = { type: 'resize', isLeft: $(this).hasClass('left'), el: $(this).parent() };
			});

			$(document).on('mousemove', function (e) {
				if (!drag) return;
				const gridLeft = $grid.offset().left + parseFloat(LABEL_W) * 16;
				const colW = parseFloat(COL_W) * 16;
				const col = Math.max(0, Math.floor((e.pageX - gridLeft) / colW));

				if (drag.type === 'create') {
					drag.end = col;
					const s = Math.min(drag.start, drag.end), en = Math.max(drag.start, drag.end);
					drag.el.css({ gridColumn: `${s + 2} / ${en + 3}`, gridRow: drag.row + HEADER_ROWS + 1 });
				} else if (drag.type === 'resize') {
					const d = drag.el.data();
					if (drag.isLeft) {
						const newStart = Math.min(col, d.colEnd);
						drag.el.css({ gridColumn: `${newStart + 2} / ${d.colEnd + 3}` });
						drag.el.data('colStart', newStart);
					} else {
						const newEnd = Math.max(col, d.colStart);
						drag.el.css({ gridColumn: `${d.colStart + 2} / ${newEnd + 3}` });
						drag.el.data('colEnd', newEnd);
					}
				}
			});

			$(document).on('mouseup', function () {
				if (!drag) return;
				if (drag.type === 'create') {
					const s = Math.min(drag.start, drag.end), en = Math.max(drag.start, drag.end);
					resources[drag.row].bookings.push({ start: dateFromCol(s), end: dateFromCol(en) });
				} else if (drag.type === 'resize') {
					const d = drag.el.data();
					resources[d.row].bookings = resources[d.row].bookings.map(b => {
						if (daysBetween(START, new Date(b.start)) === d.colStart ||
							daysBetween(START, new Date(b.end)) === d.colEnd) {
							return { start: dateFromCol(d.colStart), end: dateFromCol(d.colEnd) };
						}
						return b;
					});
				}
				drag = null;
				buildGantt($('.gantt-grid'));
			});

			$grid.on('focus', '.bg', function () {
				$('.focused').removeClass('focused');
				$(this).addClass('focused');
			});

			$grid.on('keydown', '.bg', function (e) {
				const row = +$(this).data('row'), col = +$(this).data('col');
				const map = { ArrowRight: [row, col + 1], ArrowLeft: [row, col - 1], ArrowDown: [row + 1, col], ArrowUp: [row - 1, col] };
				if (map[e.key]) {
					e.preventDefault();
					const [r, c] = map[e.key];
					$grid.find(`[data-row=${r}][data-col=${c}]`).focus();
				}
			});
		}

		$(function () { buildGantt($('.gantt-grid')); });
	</script>
