	<script>
		$(document).ready(function () {
			let currentToast = null;
			let currentTimer = null;
			function triggerToast() {
				const message = document.getElementById('toastMessage').value || "Notification";
				const type = document.getElementById('toastType').value;
				const duration = parseInt(document.getElementById('toastDuration').value, 10);
				const actionText = document.getElementById('toastAction').value.trim();
				const persistent = document.getElementById('persistent').checked;
				const showIcon = document.getElementById('showIcon').value.trim() || null;
				const showDismiss = document.getElementById('showDismiss').checked;

				// If a toast is already visible, replace it immediately
				if (currentToast) {
					currentToast.remove();
					currentToast = null;
				}

				if (currentTimer) {
					currentTimer.cancel();
					currentTimer = null;
				}

				currentToast = createToast(message, {
					type,
					duration,
					persistent,
					action: actionText || null,
					onAction: actionText ? () => alert('Action clicked!') : null,
					icon: showIcon,
					showDismiss
				});

				document.getElementById('toastGroup').appendChild(currentToast);
			}

			function createToast(message, options = {}) {
				const div = document.createElement('div');
				div.className = `saToast ${options.type || ''}`.trim();

				const role = (options.type === 'error' || options.type === 'alert') ? 'alert' : 'status';
				div.setAttribute('role', role);

				// Icon
				let iconHTML = '';
				const iconInput = (typeof options.icon === 'string') ? options.icon.trim() : options.icon;
				if (iconInput !== false && iconInput !== null && iconInput !== '') {
					switch (options.type) {
						case 'success':
							iconHTML = `<i class="fas fa-circle-check saToastIcon saSuccess"></i>`;
							break;
						case 'error':
							iconHTML = `<i class="fas fa-octagon-xmark saToastIcon saError"></i>`;
							break;
						case 'warning':
							iconHTML = `<i class="fas fa-triangle-exclamation saToastIcon saWarning"></i>`;
							break;
						default:
							const iconName = (typeof iconInput === 'string' && iconInput.trim()) ? iconInput.trim() : 'crow';
							iconHTML = `<i class="far fa-${iconName} saToastIcon"></i>`;
					}
				}

				div.innerHTML = `
						${iconHTML}
							<div class="saToastText">${message}</div>
							${options.action ? `
							<button type="button" class="saToastButton">
								<div class="saButtonText">${options.action}</div>
							</button>` : ''}
						${options.showDismiss ? `
							<button type="button" class="saCloseButton" aria-label="Dismiss notification">
								<i class="far fa-xmark saIcon"></i>
							</button>`
					 : ''}
				`;

				const close = () => {
					if (!currentToast) return;
					if (currentTimer) {
						currentTimer.cancel();
						currentTimer = null;
					}
					currentToast.classList.add('saClosed');
					setTimeout(() => {
						if (currentToast) {
							currentToast.remove();
							currentToast = null;
						}
					}, 250);
				};

				// Close button
					const closeBtn = div.querySelector('.saCloseButton');
					if (closeBtn) {
						closeBtn.addEventListener('click', close);
					}

				// Action button
				const actionBtn = div.querySelector('.saToastButton');
				if (actionBtn) {
					actionBtn.addEventListener('click', () => {
						options.onAction?.();
						close();
					});
				}

				// Auto-dismiss
				if (!options.persistent) {
						const timer = attachTimer(div, options.duration || 5000, () => {
							currentTimer = null;
							close();
						});
						currentTimer = timer;
					// Pause on hover/focus
					const pause = () => timer.pause();
					const resume = () => timer.resume();

					div.addEventListener('mouseenter', pause);
					div.addEventListener('mouseleave', resume);
					div.addEventListener('focusin', pause);
					div.addEventListener('focusout', resume);
				}

				return div;
			}

			// Timer function (smooth progress)
			function attachTimer(toastEl, duration, onDone) {
				let endTime = performance.now() + duration;
				let remaining = duration;
				let raf;
				let paused = false;
				let canceled = false;

				function update(now) {
					if (paused || canceled) return;
					const timeLeft = Math.max(0, endTime - now);
					toastEl.style.setProperty('--toast-progress', `${(timeLeft / duration) * 100}%`);

					if (timeLeft <= 0) {
						onDone();
						return;
					}
					raf = requestAnimationFrame(update);
				}

				function cancel() {
					canceled = true;
					cancelAnimationFrame(raf);
				}

				function pause() {
					if (paused) return;
					paused = true;
					remaining = Math.max(0, endTime - performance.now());
					cancelAnimationFrame(raf);
				}

				function resume() {
					if (!paused) return;
					paused = false;
					endTime = performance.now() + remaining;
					raf = requestAnimationFrame(update);
				}

				raf = requestAnimationFrame(update);
				return { pause, resume, cancel };
			}


			$('input, select').on('change input', function () {
				triggerToast();
			});

			$('.saFavoriteToggle').click(function () {
				$(this).attr('aria-checked', function (i, attr) { return attr === 'true' ? 'false' : 'true'; });
			});
		});
	</script>
