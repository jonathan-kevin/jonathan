<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
		<form action="">
			<fieldset>
				<legend>Inputs</legend>
				<div>
					<label for="idle">Idle</label>
					<input type="text" id="idle" name="idle" value="Text" required>
				</div>
				<div>
					<label for="disabled">Disabled</label>
					<input type="text" id="disabled" name="disabled" value="Text" disabled required>
				</div>

				<div>
					<label for="readonly">Readonly</label>
					<input type="text" id="readonly" name="readonly" value="Text" readonly required>
				</div>

				<div>
					<label for="invalid">Invalid</label>
					<input type="text" id="invalid" name="invalid" invalid aria-invalid="true" required>
				</div>

				<div>
					<label for="time">time</label>
					<input type="time" id="time" name="time" required>
				</div>

				<div>
					<label for="date">date</label>
					<input type="date" id="date" name="date" required>
				</div>
				<div>
					<label for="datetime-local">datetime-local</label>
					<input type="datetime-local" id="datetime-local" name="datetime-local" required>
				</div>
			</fieldset>
			<button type="submit">Submit</button>
		</form>
</body>
</html>
