	<script>
		$(function () {
			$('#gellery-nav a').on('click', function () {
				$('#gellery-nav a').removeAttr('aria-current');
				$(this).attr('aria-current', 'true');
			});


			/* ─── DOM references ─── */
			const $slides = $('.saGulleryMain');
			const total = $slides.length;
			let current = 0;

			const $strip = $('#gullery-main');
			const $thumbList = $('#gullery-thumbnails');
			const $dotList = $('#gellery-nav');
			const $announce = $('#gullery-announce');
			const $btnPrev = $('#btn-prev');
			const $btnNext = $('#btn-next');

			/* ─── Build thumbnails from slide image data ─── */
			$slides.each(function (i) {
				const slideId = $(this).attr('id');
				const imgAlt = $(this).find('img').attr('alt');
				const imgSrc = $(this).find('img').attr('src');

				const $btn = $('<button>', {
					type: 'button',
					'aria-controls': slideId,
					'aria-label': 'View image: ' + imgAlt,
					'aria-pressed': i === 0 ? 'true' : 'false'
				}).append(
					$('<img>', { src: imgSrc, alt: '', 'aria-hidden': 'true' })
				);

				const $a = $('<a>', {
					href: '#' + slideId,
					'aria-label': 'View image: ' + imgAlt,
					'aria-controls': slideId,
					'aria-pressed': i === 0 ? 'true' : 'false'
				}).append($('<div class="dot">'));


				$('<li>', { class: 'saGulleryThumbnail' }).append($btn).appendTo($thumbList);

					if (i === current) {
					$(this).attr('aria-current', 'true');
				} else {
					$(this).removeAttr('aria-current');
				}

				$('<li>', { class: 'saDot' }).append($a).appendTo($dotList);

					if (i === current) {
					$(this).attr('aria-current', 'true');
				} else {
					$(this).removeAttr('aria-current');
				}


			});


			/* ─── Helpers ─── */
			function getThumbs() { return $thumbList.find('button'); }
			function getDots() { return $dotList.find('a'); }

			/* updateUI: syncs all state to `current`.
			   skipScroll — pass true when the scroll already happened (swipe/drag)
							so JS doesn't fight the browser mid-scroll.             */
			function updateUI(announce, skipScroll) {
				const $slide = $slides.eq(current);
				const slideId = $slide.attr('id');
				const imgAlt = $slide.find('img').attr('alt');

				if (!skipScroll) {
					document.getElementById(slideId)
						.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'start' });
				}

				/* Update aria-label on the strip so the polite live region fires */
				$strip.attr('aria-label', 'Image ' + (current + 1) + ' of ' + total);

				$btnPrev.prop('disabled', current === 0);
				$btnNext.prop('disabled', current === total - 1);

				getThumbs().each(function (i) {
					$(this).attr('aria-pressed', i === current ? 'true' : 'false');
				});
				getDots().each(function (i) {
					$(this).attr('aria-pressed', i === current ? 'true' : 'false');
				});

				getThumbs().eq(current)[0]?.scrollIntoView({ block: 'nearest', inline: 'nearest' });

				getDots().eq(current)[0]?.scrollIntoView({ block: 'nearest', inline: 'nearest' });


				if (announce !== false) {
					$announce.text('');
					setTimeout(function () {
						$announce.text('Image ' + (current + 1) + ' of ' + total + ': ' + imgAlt);
					}, 50);
				}
			}

			function goTo(index, announce, skipScroll) {
				if (index < 0 || index >= total) return;
				current = index;
				updateUI(announce, skipScroll);
			}

			/* ─── IntersectionObserver: sync on actual scroll only ──────────────────
			   Each slide is observed within the scroll container as the root.
			   When a slide reaches >=50% visibility during actual scroll it becomes
			   current — thumbnails, prev/next states, and the SR announcement all
			   update automatically. Ignores programmatic goTo() calls from buttons
			   or keyboard to avoid observing actions we just initiated.            */
			let isUserScroll = false;
			const observer = new IntersectionObserver(function (entries) {
				entries.forEach(function (entry) {
					if (entry.isIntersecting && isUserScroll) {
						const index = $slides.index(entry.target);
						if (index !== -1 && index !== current) {
							goTo(index, true, true);   // announce=true, skipScroll=true
						}
					}
				});
			}, {
				root: $strip[0],  // scope to the scroll container, not the page viewport
				threshold: 0.5         // fire when >=50% of a slide is visible
			});

			$strip.on('scroll', function () { isUserScroll = true; });
			$strip.on('scrollend', function () { isUserScroll = false; });

			$slides.each(function () { observer.observe(this); });

			/* ─── Init ─── */
			goTo(0, false);

			/* ─── Thumbnail clicks ─── */
			$thumbList.on('click', 'button', function () {
				goTo(getThumbs().index(this));
			});

			$dotList.on('click', 'a', function () {
				goTo(getDots().index(this));
			});

			/* ─── Prev / Next ─── */
			$btnPrev.on('click', function () { goTo(current - 1); });
			$btnNext.on('click', function () { goTo(current + 1); });

			/* ─── Keyboard: arrow keys on the thumbnail strip ─── */
			$thumbList.on('keydown', 'button', function (e) {
				const $thumbs = getThumbs();
				const i = $thumbs.index(this);

				const map = {
					ArrowLeft: i - 1,
					ArrowUp: i - 1,
					ArrowRight: i + 1,
					ArrowDown: i + 1,
					Home: 0,
					End: total - 1
				};

				if (!(e.key in map)) return;
				e.preventDefault();

				const next = map[e.key];
				if (next < 0 || next >= total) return;
				goTo(next);
				$thumbs.eq(next).trigger('focus');
			});

			$dotList.on('keydown', 'a', function (e) {
				const $dots = getDots();
				const i = $dots.index(this);

				const map = {
					ArrowLeft: i - 1,
					ArrowUp: i - 1,
					ArrowRight: i + 1,
					ArrowDown: i + 1,
					Home: 0,
					End: total - 1
				};

				if (!(e.key in map)) return;
				e.preventDefault();

				const next = map[e.key];
				if (next < 0 || next >= total) return;
				goTo(next);
				$dots.eq(next).trigger('focus');
			});

			/* ─── Keyboard: PageUp / PageDown anywhere inside the gallery ─── */
			$(document).on('keydown', function (e) {
				const $focused = $(document.activeElement);
				const inGallery = $focused.closest('.saGullery').length || $focused.is('body');
				if (!inGallery) return;

				if (e.key === 'PageUp') { e.preventDefault(); goTo(current - 1); }
				if (e.key === 'PageDown') { e.preventDefault(); goTo(current + 1); }
			});

		});
	</script>
</body>
