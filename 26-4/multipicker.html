	<script>
		$(document).ready(function () {
			var nrChecked = $('.saMultiPickerItem').length;
			$('.saNumberOfCheckedWrapper span').text(nrChecked + ' selected');

			$(function () {
				const $tree = $('.saCheckboxTree');
				const $selectedList = $('.saMultiPickerSelected fieldset');
				const $counter = $('.saNumberOfCheckedWrapper span');

				function updateSelected() {
					const items = [];

					$tree.find('input[type="checkbox"]').each(function () {
						if (this.checked) {
							const label = $(this).siblings('span').text().trim();
							items.push(label);
						}
					});

					// Clear existing (except legend)
					$selectedList.find('.saMultiPickerItem').remove();

					// Rebuild list
					items.forEach(text => {
						const $item = $(`
							<div class="saMultiPickerItem">
								<button class="saDeleteButton" type="button">
									<i class="saIcon far fa-xmark"></i>
								</button>
								<label>
									<i class="saIcon far fa-grip-dots-vertical"></i>
									<input type="checkbox" tabindex="-1">
									<span></span>
								</label>
							</div>
						`);

						$item.find('span').text(text);
						$selectedList.append($item);
					});

					// Update counter
					$counter.text(`${items.length} selected`);
				}

				// Initial sync
				updateSelected();

				// Left side → update right
				$tree.on('change', 'input[type="checkbox"]', function () {
					updateSelected();
				});

				// Right side → remove (uncheck left)
				$selectedList.on('click', '.saDeleteButton', function () {
					const text = $(this).siblings('label').find('span').text().trim();

					$tree.find('label').each(function () {
						const $span = $(this).find('span');
						if ($span.text().trim() === text) {
							$(this).find('input[type="checkbox"]').prop('checked', false);
						}
					});

					updateSelected();
				});
			});
		});
	</script>
