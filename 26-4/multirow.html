	<script>
		$(function () {
			const rowTemplate = `
				<div class="saMultiRowRow">
					<div class="saMultiRowDragHandle"><div><i class="saIcon far fa-grip-dots-vertical"></i></div></div>
					<div class="saMultiRowCellWrapper"><div class="saMultiRowCell"><div class="saMultiRowInputWrapper mediumLong"><div class="saInputTextWrapper saMultiRowField mediumLong"><input type="text" class="saInputText" placeholder="e.g. 'Princess'" required></div></div></div></div>
					<div class="saMultiRowCellWrapper"><div class="saMultiRowCell"><div class="saMultiRowInputWrapper mediumLong"><div class="saInputTextWrapper saMultiRowField mediumLong saHasTrailingIcons">
						<select class="saInputText saDropdown" required>
							<option value=""></option>
							<option value="1">One</option>
							<option value="2">Two</option>
							<option value="3">Three</option>
						</select>
						<div class="saTrailingIconsWrapper"><i class="saIcon far fa-angle-down"></i></div>
					</div></div></div></div>
					<div class="saMultiRowCellWrapper"><div class="saMultiRowCell"><div class="saMultiRowInputWrapper long"><div class="saInputTextWrapper saMultiRowField long"><textarea class="saInputText saTextArea" required rows="4"></textarea></div></div></div></div>
					<div class="saMultiRowCellWrapper"><div class="saMultiRowCell">
						<ul class="saMultiRowButtons">
							<li><button class="saIconOnlyFieldButton" type="button">
								<i class="saIcon far fa-copy"></i>
							</button></li>
							<li><button class="saIconOnlyFieldButton saDestructive saDeleteRowButtonJs" type="button">
								<i class="saIcon far fa-trash-alt"></i>
							</button></li>
						</ul>
					</div></div>
				</div>`;

			function rowsGroup($wrapper) {
				return $wrapper.find('.saMultiRowRowsGroup');
			}

			function focusFirstField($row) {
				$row.find('input,select,textarea').filter(':visible').first().focus();
			}

			function addRow($wrapper) {
				const $rowsGroup = rowsGroup($wrapper);

				if ($wrapper.hasClass('saEmpty')) {
					$wrapper.removeClass('saEmpty');
				} else {
					$rowsGroup.append(rowTemplate);
				}

				focusFirstField($rowsGroup.children('.saMultiRowRow').last());
			}

			function deleteRow($wrapper, $row) {
				const $rowsGroup = rowsGroup($wrapper);

				if ($rowsGroup.find('.saMultiRowRow').length === 1) {
					$row.remove();
					$wrapper.addClass('saEmpty');
					$rowsGroup.append(rowTemplate);
					focusFirstField($rowsGroup.children('.saMultiRowRow').last());
				} else {
					$row.remove();
				}
			}

			$(document).on('click', '.saMultiRowNewRowButton', function (e) {
				e.preventDefault();
				addRow($(this).closest('.saMultiRowWrapper'));
			});

			$(document).on('click', '.saDeleteRowButtonJs', function (e) {
				e.preventDefault();
				deleteRow($(this).closest('.saMultiRowWrapper'), $(this).closest('.saMultiRowRow'));
			});
		});

	</script>
