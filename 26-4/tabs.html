	<script>
		$(function () {
			const tabViews = document.querySelectorAll('softadmin-tabview');

			function initTabView(tabView) {
				const tabs = tabView.querySelectorAll('[role="tab"]');
				const indicator = tabView.querySelector('.saTabIndicator');

				function moveIndicator(tab) {
					if (!indicator || !tab) return;
					const listRect = tab.parentElement.parentElement.getBoundingClientRect();
					const tabRect = tab.getBoundingClientRect();

					indicator.style.left = `${tabRect.left - listRect.left}px`;
					indicator.style.width = `${tabRect.width}px`;
				}

				function activateTab(tab, setFocus = true) {
					tabs.forEach(t => {
						t.setAttribute('aria-selected', 'false');
						t.setAttribute('tabindex', '-1');
					});

					tab.setAttribute('aria-selected', 'true');
					tab.setAttribute('tabindex', '0');

					if (setFocus) {
						tab.focus();
					}

					moveIndicator(tab);
				}

				tabs.forEach((tab, index) => {
					tab.addEventListener('click', e => {
						e.preventDefault();
						activateTab(tab);
					});

					tab.addEventListener('keydown', e => {
						let newIndex = index;

						if (e.key === 'ArrowRight') {
							newIndex = (index + 1) % tabs.length;
						} else if (e.key === 'ArrowLeft') {
							newIndex = (index - 1 + tabs.length) % tabs.length;
						}

						if (newIndex !== index) {
							e.preventDefault();
							activateTab(tabs[newIndex]);
						}
					});
				});

				const selectedTab = tabView.querySelector('[aria-selected="true"]') || tabs[0];

				if (selectedTab) {
					activateTab(selectedTab, false);
				}

				window.addEventListener('resize', () => {
					const activeTab = tabView.querySelector('[aria-selected="true"]');
					if (activeTab) moveIndicator(activeTab);
				});
			}

			tabViews.forEach(initTabView);
		});
	</script>
