					$items.removeClass('saActive').attr('aria-selected', 'false');
					$input.attr('aria-activedescendant', '');
					activeIndex = -1;

				function scrollActiveIntoView() {
					let $visible = getVisible();
					if (activeIndex < 0 || !$visible.length) return;

					let el            = $visible[activeIndex];
					let container     = scrollContainer;
					let elRect        = el.getBoundingClientRect();
					let containerRect = container.getBoundingClientRect();

					let elTop    = elRect.top - containerRect.top + container.scrollTop;
					let elBottom = elTop + elRect.height;
					let ctTop    = container.scrollTop;
					let ctBottom = ctTop + container.clientHeight;

					if (elTop < ctTop) {
						container.scrollTop = elTop;
					} else if (elBottom > ctBottom) {
						container.scrollTop = elBottom - container.clientHeight;
					}
				}

					let $visible = getVisible();
					if (!$visible.length) return;

					let idx = selectedIndex >= 0 ? selectedIndex : 0;
					let el  = $visible[idx];
					if (!el) return;

					let container     = scrollContainer;
					let elRect        = el.getBoundingClientRect();
					let containerRect = container.getBoundingClientRect();

					let elTop    = elRect.top - containerRect.top + container.scrollTop;
					let ctHeight = container.clientHeight;

					container.scrollTop = elTop - ctHeight / 2 + elRect.height / 2;
				}

				function setActive(index) {
					let $visible = getVisible();
					if (!$visible.length) return;

					if (index < 0) index = $visible.length - 1;

					$el.addClass('saActive').attr('aria-selected', 'true');

					if (!query) return text;
					let escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

					let text = $item.data('label');
					let code = $item.data('code');

					selectedIndex = $items.index($item);

					$button.find('.saDropdownText').text(text);
					$button.find('img').attr('src', `https://flagcdn.com/${code}.svg`);
				}

				/* ─── Open / Close ─────────────────────────────────────────── */

				function openDropdown() {
					if ($panel.hasClass('saOpen')) return;

					$panel.addClass('saOpen');
					$button.attr('aria-expanded', 'true');
					$input.val('');

					$items.show().each(function () {
						$(this).find('.saOptionText').html($(this).data('label'));
					});
					updateNoResults();

					activeIndex = selectedIndex;
					$items.removeClass('saActive').attr('aria-selected', 'false');
					let $sel = $items.eq(selectedIndex);
					$sel.addClass('saActive').attr('aria-selected', 'true');
					$input.attr('aria-activedescendant', $sel.attr('id'));

					setTimeout(() => {
						$input.focus();
						scrollToSelected();
					}, 0);
				}

				function closeDropdown({ returnFocus = false } = {}) {
					if (!$panel.hasClass('saOpen')) return;

					$panel.removeClass('saOpen');
					$button.attr('aria-expanded', 'false');
					$input.val('');

					$items.show().each(function () {
						$(this).find('.saOptionText').html($(this).data('label'));
					});
					updateNoResults();
					resetActive();

					if (returnFocus) $button.focus();
				}

				/* ─── Events ───────────────────────────────────────────────── */

				$button.on('click', function () {
					$panel.hasClass('saOpen') ? closeDropdown({ returnFocus: true }) : openDropdown();
				});

				$input.on('input', function () {
					filterList($(this).val());
				});

				$input.on('keydown', function (e) {
					let $visible = getVisible();

					switch (e.key) {
						case 'ArrowDown':
							e.preventDefault();
							setActive(activeIndex + 1);
							break;
						case 'ArrowUp':
							e.preventDefault();
							setActive(activeIndex - 1);
							break;
						case 'Home':
							e.preventDefault();
							setActive(0);
							break;
						case 'End':
							e.preventDefault();
							setActive($visible.length - 1);
							break;
						case 'Enter':
							e.preventDefault();
							if (!$visible.length || activeIndex < 0) return;
							updateButton($visible.eq(activeIndex));
							closeDropdown({ returnFocus: true });
							break;
						case 'Escape':
							closeDropdown({ returnFocus: true });
							break;
						case 'Tab':
							closeDropdown();
							break;
					}
				});

				$button.on('keydown', function (e) {
					if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
						typeBuffer += e.key.toLowerCase();
						clearTimeout(typeTimer);
						typeTimer = setTimeout(() => (typeBuffer = ''), 700);

						let $match = $items.filter(function () {
							return $(this).data('label').toLowerCase().startsWith(typeBuffer);
						}).first();

						if ($match.length) updateButton($match);
						return;
					}

					switch (e.key) {
						case 'ArrowDown':
							e.preventDefault();
							if (e.altKey) {
								openDropdown();
							} else {
								let $next = $items.eq(selectedIndex + 1);
								if ($next.length) updateButton($next);
							}
							break;
						case 'ArrowUp':
							e.preventDefault();
							if (e.altKey) {
								openDropdown();
							} else {
								let $prev = $items.eq(selectedIndex - 1);
								if ($prev.length) updateButton($prev);
							}
							break;
						case 'Enter':
						case ' ':
							e.preventDefault();
							openDropdown();
							break;
						case 'Home':
							e.preventDefault();
							updateButton($items.first());
							break;
						case 'End':
							e.preventDefault();
							updateButton($items.last());
							break;
					}
				});


				$items.on('click', function () {
					updateButton($(this));
					closeDropdown({ returnFocus: true });
				});

				$(document).on('click focusin', function (e) {
					if ($panel.hasClass('saOpen') && !$(e.target).closest('.saDropdown, #contextMenu').length) {
						closeDropdown();
					}
				});
			});



			setTimeout(() => {
			$('#opt-se').addClass('saActive').attr('aria-active', 'true')
			}, 20);






			$(document).on('input', '#value', function () {
				const input = this;
				if (input.value.endsWith('@')) {
					input.value = input.value.slice(0, -1);
					$(input).next('select').focus();
				}
			});

			$(document).on('input', '#value3', function () {
				const input = this;
				let cursorPosition = input.selectionStart;
				let originalValue = input.value;

				// 1. Strip everything that isn't a digit
				let digits = originalValue.replace(/\D/g, '');

				// 2. Limit to exactly 9 digits
				digits = digits.substring(0, 9);

				// 3. Apply the dash formatting (XXX-XXX-XXX)
				let formatted = '';
				if (digits.length > 0) {
					// First set of 3
					formatted += digits.substring(0, 3);
					if (digits.length > 3) {
						// Second set of 3
						formatted += '-' + digits.substring(3, 6);
					}
					if (digits.length > 6) {
						// Third set of 3
						formatted += '-' + digits.substring(6, 9);
					}
				}

				// 4. Update the input value
				input.value = formatted;

				// 5. Adjust caret position
				// If the user added a character that triggered a new dash,
				// we push the cursor forward by 1.
				if (formatted.length > originalValue.length && (formatted[cursorPosition - 1] === '-')) {
					cursorPosition++;
				}

				input.setSelectionRange(cursorPosition, cursorPosition);
			});
		});
	</script>
</body>
