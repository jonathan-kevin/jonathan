<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Shadcn Softadmin Shell</title>
	<style>
		@font-face {
			font-family: "Geist";
			src: url("./Fonts/Geist-VariableFont_wght.ttf") format("truetype");
			font-weight: 100 900;
		}

		:root {
			--background: 0 0% 100%;
			--foreground: 222.2 84% 4.9%;
			--muted: 210 40% 96.1%;
			--muted-foreground: 215.4 16.3% 46.9%;
			--card: 0 0% 100%;
			--card-foreground: 222.2 84% 4.9%;
			--border: 214.3 31.8% 91.4%;
			--input: 214.3 31.8% 91.4%;
			--primary: 221.2 83.2% 53.3%;
			--primary-foreground: 210 40% 98%;
			--secondary: 210 40% 96.1%;
			--secondary-foreground: 222.2 47.4% 11.2%;
			--accent: 210 40% 96.1%;
			--accent-foreground: 222.2 47.4% 11.2%;
			--ring: 221.2 83.2% 53.3%;
			--radius: 0.625rem;
			color-scheme: light;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			background: hsl(var(--background));
			color: hsl(var(--foreground));
			font-family: "Geist", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			font-size: 0.875rem;
			letter-spacing: 0;
		}

		button,
		input {
			font: inherit;
		}

		button {
			cursor: pointer;
		}

		.shell {
			display: grid;
			grid-template-columns: 18rem minmax(0, 1fr);
			min-height: 100vh;
			background: hsl(var(--background));
		}

		.sidebar {
			display: flex;
			flex-direction: column;
			min-height: 100vh;
			border-right: 1px solid hsl(var(--border));
			background:
				linear-gradient(180deg, hsl(var(--muted) / 0.72), hsl(var(--card)) 14rem),
				hsl(var(--card));
		}

		.sidebar-head {
			display: grid;
			gap: 0.875rem;
			padding: 1rem;
		}

		.customer-logo {
			display: flex;
			align-items: center;
			gap: 0.75rem;
			min-width: 0;
		}

		.logo-mark {
			display: grid;
			grid-template-columns: repeat(3, 0.38rem);
			gap: 0.18rem;
			flex: 0 0 auto;
			padding: 0.42rem;
			border-radius: var(--radius);
			background: hsl(var(--background));
			border: 1px solid hsl(var(--border));
			box-shadow: 0 1px 2px hsl(222.2 84% 4.9% / 0.06);
		}

		.logo-mark span {
			width: 0.38rem;
			height: 0.38rem;
			border-radius: 0.12rem;
			background: hsl(var(--primary));
		}

		.logo-mark span:nth-child(3n + 2) {
			background: hsl(269 86% 62%);
		}

		.logo-mark span:nth-child(3n) {
			background: hsl(153 65% 42%);
		}

		.logo-text {
			min-width: 0;
		}

		.logo-title {
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			font-size: 0.9375rem;
			font-weight: 700;
			line-height: 1.25rem;
		}

		.logo-subtitle {
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			color: hsl(var(--muted-foreground));
			font-size: 0.75rem;
			line-height: 1rem;
		}

		.command {
			position: relative;
		}

		.command svg {
			position: absolute;
			left: 0.75rem;
			top: 50%;
			width: 1rem;
			height: 1rem;
			transform: translateY(-50%);
			color: hsl(var(--muted-foreground));
		}

		.command input {
			width: 100%;
			height: 2.375rem;
			padding: 0 0.75rem 0 2.25rem;
			border: 1px solid hsl(var(--input));
			border-radius: calc(var(--radius) - 2px);
			background: hsl(var(--background));
			color: hsl(var(--foreground));
			outline: none;
			box-shadow: 0 1px 2px hsl(222.2 84% 4.9% / 0.04);
		}

		.command input:focus {
			border-color: hsl(var(--ring));
			box-shadow: 0 0 0 3px hsl(var(--ring) / 0.14);
		}

		.sidebar-body {
			flex: 1;
			overflow: auto;
			padding: 0.25rem 0.75rem 0.75rem;
		}

		.nav-section {
			display: grid;
			gap: 0.25rem;
			margin-bottom: 1.125rem;
		}

		.nav-heading {
			padding: 0.5rem 0.625rem 0.375rem;
			color: hsl(var(--muted-foreground));
			font-size: 0.75rem;
			font-weight: 650;
		}

		.nav-item {
			display: flex;
			align-items: center;
			gap: 0.625rem;
			width: 100%;
			height: 2.375rem;
			padding: 0 0.625rem;
			border: 0;
			border-radius: calc(var(--radius) - 2px);
			background: transparent;
			color: hsl(var(--foreground));
			text-align: left;
		}

		.nav-item:hover {
			background: hsl(var(--accent));
		}

		.nav-item[aria-current="page"] {
			background: hsl(var(--primary) / 0.1);
			color: hsl(var(--primary));
			font-weight: 600;
		}

		.nav-item svg {
			flex: 0 0 auto;
			width: 1rem;
			height: 1rem;
			color: hsl(var(--muted-foreground));
		}

		.nav-item[aria-current="page"] svg {
			color: hsl(var(--primary));
		}

		.sidebar-foot {
			display: grid;
			gap: 0.625rem;
			padding: 0.75rem;
			border-top: 1px solid hsl(var(--border));
			background: hsl(var(--card));
		}

		.side-link,
		.account-button {
			display: flex;
			align-items: center;
			gap: 0.625rem;
			width: 100%;
			height: 2.375rem;
			padding: 0 0.625rem;
			border: 0;
			border-radius: calc(var(--radius) - 2px);
			background: transparent;
			color: hsl(var(--foreground));
			text-decoration: none;
			text-align: left;
		}

		.side-link:hover,
		.account-button:hover {
			background: hsl(var(--accent));
		}

		.side-link svg,
		.account-button svg {
			width: 1rem;
			height: 1rem;
			color: hsl(var(--muted-foreground));
		}

		.avatar {
			display: grid;
			place-items: center;
			flex: 0 0 auto;
			width: 1.875rem;
			height: 1.875rem;
			border-radius: 999px;
			background: hsl(var(--primary));
			color: hsl(var(--primary-foreground));
			font-size: 0.75rem;
			font-weight: 750;
		}

		.main {
			display: grid;
			grid-template-rows: auto 1fr;
			min-width: 0;
			min-height: 100vh;
		}

		.topbar {
			display: grid;
			gap: 0.875rem;
			padding: 1rem 1.5rem;
			border-bottom: 1px solid hsl(var(--border));
			background: hsl(var(--background) / 0.96);
		}

		.top-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 1rem;
			min-width: 0;
		}

		.left-trail {
			display: flex;
			align-items: center;
			gap: 0.625rem;
			min-width: 0;
		}

		.icon-button {
			position: relative;
			display: inline-grid;
			place-items: center;
			flex: 0 0 auto;
			width: 2.25rem;
			height: 2.25rem;
			border: 1px solid hsl(var(--border));
			border-radius: calc(var(--radius) - 2px);
			background: hsl(var(--background));
			color: hsl(var(--foreground));
			box-shadow: 0 1px 2px hsl(222.2 84% 4.9% / 0.04);
		}

		.icon-button:hover {
			background: hsl(var(--accent));
		}

		.icon-button svg {
			width: 1rem;
			height: 1rem;
		}

		.breadcrumbs {
			display: flex;
			align-items: center;
			gap: 0.375rem;
			min-width: 0;
			color: hsl(var(--muted-foreground));
			font-size: 0.8125rem;
		}

		.breadcrumbs a {
			color: hsl(var(--primary));
			text-decoration: none;
		}

		.breadcrumbs a:hover {
			text-decoration: underline;
		}

		.breadcrumb-current {
			min-width: 0;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}

		.utility-actions {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			flex: 0 0 auto;
		}

		.badge-dot {
			position: absolute;
			right: 0.35rem;
			top: 0.3rem;
			width: 0.5rem;
			height: 0.5rem;
			border: 2px solid hsl(var(--background));
			border-radius: 999px;
			background: hsl(0 84% 60%);
		}

		.title-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 1.25rem;
			min-width: 0;
		}

		.title-group {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			min-width: 0;
		}

		h1 {
			margin: 0;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
			font-size: 1.5rem;
			font-weight: 700;
			line-height: 2rem;
		}

		.primary-actions {
			display: flex;
			align-items: center;
			gap: 0.5rem;
			flex: 0 0 auto;
		}

		.button {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			gap: 0.5rem;
			height: 2.375rem;
			padding: 0 0.875rem;
			border: 1px solid hsl(var(--border));
			border-radius: calc(var(--radius) - 2px);
			background: hsl(var(--background));
			color: hsl(var(--foreground));
			font-weight: 600;
			box-shadow: 0 1px 2px hsl(222.2 84% 4.9% / 0.04);
		}

		.button:hover {
			background: hsl(var(--accent));
		}

		.button svg {
			width: 1rem;
			height: 1rem;
		}

		.button-primary {
			border-color: hsl(var(--primary));
			background: hsl(var(--primary));
			color: hsl(var(--primary-foreground));
		}

		.button-primary:hover {
			background: hsl(var(--primary) / 0.92);
		}

		.work-area {
			min-height: 0;
			background:
				radial-gradient(circle at top left, hsl(var(--primary) / 0.08), transparent 26rem),
				linear-gradient(180deg, hsl(var(--muted) / 0.55), hsl(var(--background)) 14rem);
		}

		.work-area-inner {
			min-height: 100%;
		}

		.mobile-header {
			display: none;
		}

		@media (max-width: 64rem) {
			.shell {
				grid-template-columns: 1fr;
			}

			.sidebar {
				display: none;
			}

			.topbar {
				display: none;
			}

			.mobile-header {
				display: grid;
				gap: 0.75rem;
				padding: 0.75rem;
				border-bottom: 1px solid hsl(var(--border));
				background: hsl(var(--background));
			}

			.mobile-main-row {
				display: flex;
				align-items: center;
				gap: 0.5rem;
				min-width: 0;
			}

			.mobile-title {
				flex: 1;
				min-width: 0;
			}

			.mobile-title h1 {
				font-size: 1rem;
				line-height: 1.5rem;
			}

			.mobile-actions {
				display: flex;
				gap: 0.5rem;
				overflow-x: auto;
				padding-bottom: 0.125rem;
			}
		}
	</style>
</head>

<body>
	<div class="shell">
		<aside class="sidebar">
			<div class="sidebar-head">
				<div class="customer-logo">
					<div class="logo-mark" aria-hidden="true">
						<span></span><span></span><span></span>
						<span></span><span></span><span></span>
						<span></span><span></span><span></span>
					</div>
					<div class="logo-text">
						<div class="logo-title">Nordic Manufacturing</div>
						<div class="logo-subtitle">Operations system</div>
					</div>
				</div>
				<label class="command">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<circle cx="11" cy="11" r="8"></circle>
						<path d="m21 21-4.3-4.3"></path>
					</svg>
					<input type="search" placeholder="Search...">
				</label>
			</div>

			<nav class="sidebar-body" aria-label="Main navigation">
				<div class="nav-section">
					<div class="nav-heading">Favorites</div>
					<button class="nav-item" type="button" aria-current="page">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M3 21h18"></path>
							<path d="M5 21V7l8-4v18"></path>
							<path d="M19 21V11l-6-4"></path>
						</svg>
						Customers
					</button>
					<button class="nav-item" type="button">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

							<path d="M19 17h3v-6h-3l-3-4h-2"></path>

					</button>
				</div>

				<div class="nav-section">
					<div class="nav-heading">Administration</div>
					<button class="nav-item" type="button">

							<path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"></path>
							<path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V22a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H2a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3h.1a1.7 1.7 0 0 0 1-1.6V2a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6h.1a1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1a1.7 1.7 0 0 0 1.6 1H22a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.6 1z"></path>

			</nav>

			<div class="sidebar-foot">
				<a class="side-link" href="#">

			</div>
		</aside>

		<div class="main">
			<header class="topbar">
				<div class="top-row">
					<div class="left-trail">
						<button class="icon-button" type="button" aria-label="Back">

								<path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V22a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H2a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3h.1a1.7 1.7 0 0 0 1-1.6V2a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6h.1a1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1a1.7 1.7 0 0 0 1.6 1H22a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.6 1z"></path>
							</svg>

							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

				<div class="title-row">

							</svg>
