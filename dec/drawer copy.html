	<script>
		$(document).ready(function () {
			const dialog = document.querySelector('.saPopupOverlay');
			const drawer = document.querySelector('.saPopupOverlay .saDrawer');
			const root = document.querySelector('.saRootContentWrapper');
			const body = document.querySelector('body');
			const btnIcon = document.querySelector('.saButtonModal i.saIcon');

			$('.saExpander').click(function (e) {
				e.preventDefault();
				$('#SideBar').toggleClass('saExpanded saMinimized');
			});

			$('.saButtonModal').click(function (e) {
				e.preventDefault();

				if($(dialog).hasClass('saOpen')) {
					 closeDialog();
				}
				else if ($(dialog).hasClass('saClosed')) {
					openDialog();
				}
			});

			function openDialog() {
				root.setAttribute('aria-hidden', 'true');
				body.style.overflow = 'hidden';
				dialog.classList.remove('saClosed');
				dialog.classList.add('saOpen');
				dialog.setAttribute('aria-modal', 'true');
				btnIcon.classList.remove('fa-arrow-left-from-line');
				btnIcon.classList.add('fa-arrow-right-from-line');

				setTimeout(() => {
					$('#searchTerm').focus();
				}, 200);
			}

			function closeDialog() {
				root.setAttribute('aria-hidden', 'false');
				body.style.overflow = 'unset';
				dialog.classList.remove('saOpen');
				dialog.classList.add('saClosed');
				dialog.setAttribute('aria-modal', 'false');
				btnIcon.classList.remove('fa-arrow-right-from-line');
				btnIcon.classList.add('fa-arrow-left-from-line');
			}

			$('.open').on('click', function (e) {
				openDialog();
			});

			$('.close').on('click', function (e) {
				e.preventDefault();
				closeDialog();
			});

			$('.saPopupOverlay').on('click', function (e) {
				if (e.target === this) {
					closeDialog();
				}
			});

			document.addEventListener('keydown', (e) => {
				if (e.key === 'Escape') {
					e.preventDefault();
					closeDialog();
				}
			})

			$('.saSectionHeader').on('click', function () {
				const $button = $(this);
				const expanded = $button.attr('aria-expanded') === 'true';
				$button.attr('aria-expanded', expanded ? 'false' : 'true');

				const $icon = $button.find('.saIcon');
				$icon.toggleClass('saClosed', expanded);

				const $fieldset = $button.closest('fieldset');
				// Hide/show all fields after the legend inside this fieldset
				const $fields = $fieldset.children('.saFieldAndLabelWrapper, .saSiblingRow');
				if (expanded) {
					$fields.hide();
				} else {
					$fields.show();
				}
			});

			$('.saFavoriteToggle').click(function () {
				$(this).attr('aria-checked', function (i, attr) { return attr === 'true' ? 'false' : 'true'; });
			});
		});

	</script>
