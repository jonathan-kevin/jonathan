											<fieldset class="saInputC0lorShade" id="bg">

											</div>

										<script>
											$(document).ready(function () {

												/* -----------------------------------------------------
												CONFIG
												----------------------------------------------------- */

												const families = ['Red', 'Orange', 'Yellow', 'Green', 'Sky', 'Blue', 'Purple', 'Pink', 'Gray'];
												const shades = [0, 50, 100, 200, 300, 400, 500, 600, 700, 800, 900, 950];

												// Strict high-contrast map
												const highContrastMap = {
													0:   [600, 700, 800, 900, 950],
													50:  [600, 700, 800, 900, 950],
													100: [700, 800, 900, 950],
													200: [800, 900, 950],
													300: [800, 900, 950],
													400: [900, 950],
													500: [950],
													600: [0, 50],
													700: [0, 50, 100],
													800: [0, 50, 100, 200, 300],
													900: [0, 50, 100, 200, 300, 400],
													950: [0, 50, 100, 200, 300, 400, 500]
												};

												// DOM refs
												const $family = $("#family");
												const $bg = $("#bg");
												const $text = $("#text");

												const $preview = $("#preview .saC0lor");
												const $previewText = $preview.find("div");

												const $randomizeButton = $("#randomizeButton");

												/* -----------------------------------------------------
												GENERATE SWATCHES
												----------------------------------------------------- */

												function generateSwatches() {

													// Families
													families.forEach(f => {
														const label = $("<label>");
														const input = $('<input type="radio" name="family">')
															.val(f)
															.attr("id", `family-${f}`)
															.css("background-color", `var(--Sa-Color-${f})`);
														label.append(input);
														$family.append(label);
													});

													// Background shades
													shades.forEach(sh => {
														const label = $("<label>");
														const input = $('<input type="radio" name="bgShade">')
															.val(sh)
															.attr("id", `bg-${sh}`);
														label.append(input);
														$bg.append(label);
													});

													// Text shades
													shades.forEach(sh => {
														const label = $("<label>");
														const input = $('<input type="radio" name="textShade">')
															.val(sh)
															.attr("id", `text-${sh}`);
														label.append(input);
														$text.append(label);
													});
												}

												/* -----------------------------------------------------
												APPLY COLORS TO PREVIEW
												----------------------------------------------------- */

												function applySelectedColors() {
													const family = $family.find("input:checked").val() || "Blue";
													const bgShade = $bg.find("input:checked").val() || "50";
													const textShade = $text.find("input:checked").val() || "900";

													// Apply background
													$preview.attr("class", `saC0lor sa${family}${bgShade}`);

													// Apply text
													$previewText.attr("class", `saText${family}${textShade}`);
												}

												/* -----------------------------------------------------
												CONTRAST LOGIC (text shade unlock)
												----------------------------------------------------- */

												function updateContrast(bgShade) {
													bgShade = parseInt(bgShade);

													const allowed = highContrastMap[bgShade] || [];

													$text.find("input").each(function () {
														const shade = parseInt($(this).val());
														$(this).prop("disabled", !allowed.includes(shade));
													});
												}

												/* -----------------------------------------------------
												RANDOMIZER
												----------------------------------------------------- */

												function randomizeSelections() {
													// Random family
													const family = families[Math.floor(Math.random() * families.length)];
													$family.find(`input[value="${family}"]`).prop("checked", true);

													// Random background
													const bgShade = shades[Math.floor(Math.random() * shades.length)];
													$bg.find(`input[value="${bgShade}"]`).prop("checked", true);

													// Valid text shades
													const allowed = highContrastMap[bgShade] || [];
													if (allowed.length > 0) {
														const textShade = allowed[Math.floor(Math.random() * allowed.length)];
														$text.find(`input[value="${textShade}"]`).prop("checked", true);
													}

													updateContrast(bgShade);
													applySelectedColors();
												}

												/* -----------------------------------------------------
												EVENT HANDLING
												----------------------------------------------------- */

												// Family changes text + BG classes
												$family.on("change", "input[type='radio']", applySelectedColors);

												// BG changes contrast + preview
												$bg.on("change", "input[type='radio']", function () {
													updateContrast($(this).val());
													applySelectedColors();
												});

												// Text changes preview only
												$text.on("change", "input[type='radio']", applySelectedColors);

												// Randomize button
												$randomizeButton.on("click", randomizeSelections);

												/* -----------------------------------------------------
												INIT
												----------------------------------------------------- */

												generateSwatches();

												// Defaults
												$family.find(`input[value="Blue"]`).prop("checked", true);
												$bg.find(`input[value="50"]`).prop("checked", true);
												$text.find(`input[value="900"]`).prop("checked", true);

												updateContrast(50);
												applySelectedColors();

											});
										</script>
