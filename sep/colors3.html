											<fieldset class="saInputC0lorShade saGridz" id="family">
												<legend>Color</legend>

										<script>
											$(document).ready(function () {
												const CONFIG = {
													families: ['Red', 'Orange', 'Yellow', 'Green', 'Sky', 'Blue', 'Purple', 'Pink', 'Gray'],
													shades: [0, 50, 100, 200, 300, 400, 500, 600, 700, 800, 900, 950],
													contrastMap: {
														0: [600, 700, 800, 900, 950], 50: [600, 700, 800, 900, 950], 100: [700, 800, 900, 950],
														200: [800, 900, 950], 300: [800, 900, 950], 400: [900, 950], 500: [950],
														600: [0, 50], 700: [0, 50, 100], 800: [0, 50, 100, 200, 300],
														900: [0, 50, 100, 200, 300, 400], 950: [0, 50, 100, 200, 300, 400, 500]
													}
												};

												const UI = {
													$bgGrid: $('#family'),
													$fgGrid: $('#text'),
													$preview: $('#preview'),
													$previewText: $('#preview .text'),
													$randomBtn: $('#randomizeButton')
												};

												const App = {
													init() {
														// Setup DOM
														this.renderGrid(UI.$bgGrid, 'bgGroup');
														this.renderGrid(UI.$fgGrid, 'fgGroup');

														// Add Swap Button
														this.$swapBtn = $('<button type="button" class="saButtonSwap">Swap</button>');
														UI.$randomBtn.after(this.$swapBtn);

														this.bindEvents();
														this.setDefault();
													},

													renderGrid($container, groupName) {
														let html = '<legend>' + (groupName === 'bgGroup' ? 'Background' : 'Text') + '</legend>';

														// 1. Column Headers (The "0" through "950" labels)
														html += '<div class="grid-corner"></div>'; // Top-left empty cell
														CONFIG.shades.forEach(s => html += `<div class="col-head">${s}</div>`);

														// 2. Rows: Row Header + Radio Inputs
														CONFIG.families.forEach(f => {
															html += `<div class="row-head">${f}</div>`;
															CONFIG.shades.forEach(s => {
																const family = (s === 0) ? 'Gray' : f;
																html += `
                        <label class="saSwatch">
                            <input type="radio" name="${groupName}" value="${family}-${s}" class="sa${family}${s}">
                        </label>`;
															});
														});
														$container.html(html);
													},

													bindEvents() {
														$('.saInputC0lorShadeWrapper').on('change', 'input', () => this.update());
														UI.$randomBtn.on('click', () => this.randomize());
														this.$swapBtn.on('click', () => this.swap());
													},

													update() {
														const bgVal = UI.$bgGrid.find('input:checked').val();
														const fgVal = UI.$fgGrid.find('input:checked').val();
														if (!bgVal || !fgVal) return;

														const [bgF, bgS] = bgVal.split('-');
														const [fgF, fgS] = fgVal.split('-');

														// Update Preview
														UI.$preview.attr('class', `saC0lor sa${bgF}${bgS}`);
														UI.$previewText.attr('class', `text saText${fgF}${fgS}`);

														// Apply Contrast Masking to FG Grid
														const allowed = CONFIG.contrastMap[parseInt(bgS)] || [];
														UI.$fgGrid.find('input').each(function () {
															const s = parseInt($(this).val().split('-')[1]);
															const isOff = !allowed.includes(s);
															$(this).prop('disabled', isOff).parent().toggleClass('is-disabled', isOff);
														});
													},

													swap() {
														const bg = UI.$bgGrid.find('input:checked').val();
														const fg = UI.$fgGrid.find('input:checked').val();

														UI.$bgGrid.find(`input[value="${fg}"]`).prop('checked', true);
														UI.$fgGrid.find(`input[value="${bg}"]`).prop('checked', true);
														this.update();
													},

													randomize() {
														const f = () => CONFIG.families[Math.floor(Math.random() * CONFIG.families.length)];
														const s = () => CONFIG.shades[Math.floor(Math.random() * CONFIG.shades.length)];

														const randBgS = s();
														const allowedFg = CONFIG.contrastMap[randBgS];

														UI.$bgGrid.find(`input[value="${f()}-${randBgS}"]`).prop('checked', true);
														UI.$fgGrid.find(`input[value="${f()}-${allowedFg[Math.floor(Math.random() * allowedFg.length)]}"]`).prop('checked', true);
														this.update();
													},

													setDefault() {
														UI.$bgGrid.find('input[value="Blue-500"]').prop('checked', true);
														UI.$fgGrid.find('input[value="Gray-0"]').prop('checked', true);
														this.update();
													}
												};

												App.init();
											});
										</script>
